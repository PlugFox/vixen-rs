# Server CI — runs on PRs to master and pushes to master that touch server/**.
#
# Five jobs run in parallel:
#   fmt         — cargo fmt --all -- --check
#   clippy      — cargo clippy --all-targets --all-features -- -D warnings
#   test        — cargo test --workspace --all-features  (DB-free, default)
#   integration — cargo test … -- --include-ignored      (postgres + redis)
#   sqlx-check  — cargo sqlx prepare --check --workspace -- --all-targets
#
# `test` runs SQLX_OFFLINE=true against the .sqlx/ cache — no live DB.
# Integration tests (`#[ignore]`-gated, e.g. tests/captcha.rs, captcha_state.rs,
# redis_pubsub.rs) opt-in via `--include-ignored` in the dedicated
# `integration` job that brings up postgres + redis service containers.

name: Server CI

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/server-ci.yml'
  workflow_dispatch:

# Cancel an in-flight run when a new commit is pushed to the same branch / PR.
concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: 'true'
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: server

jobs:
  # ── Formatting ──────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Clippy ──────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Test ────────────────────────────────────────────────────
  # Default `cargo test` — DB-free unit + non-ignored integration tests.
  # `#[ignore]`-gated tests (postgres / redis backed) run in `integration`.
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo test --workspace --all-features

  # ── Integration ─────────────────────────────────────────────
  # Runs `#[ignore]`-gated tests that need real services:
  #   tests/captcha.rs        — #[sqlx::test] needs DATABASE_URL + postgres
  #   tests/captcha_state.rs  — needs CONFIG_REDIS_URL + redis
  #   tests/redis_pubsub.rs   — needs redis://localhost:6379
  #
  # SQLX_OFFLINE stays on so the build still uses .sqlx/; the live DB is only
  # consumed at test runtime by `#[sqlx::test]`'s per-test database setup.
  integration:
    name: Integration (postgres + redis)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vixen
          POSTGRES_PASSWORD: vixen_dev_password
          POSTGRES_DB: vixen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vixen -d vixen"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://vixen:vixen_dev_password@localhost:5432/vixen
      CONFIG_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - run: cargo test --workspace --all-features -- --include-ignored

  # ── SQLx prepare --check ────────────────────────────────────
  # Verifies the .sqlx/ offline cache matches the current sqlx::query! macros.
  # With no queries committed yet (M0), prepare --check is effectively a
  # build-only smoke test — once M1 lands real query!() calls, the .sqlx/
  # directory becomes the source of truth and any drift fails this job.
  sqlx-check:
    name: SQLx prepare --check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
          # sqlx-cli installation is shared across runs via the cargo bin cache.
          cache-targets: 'true'
          cache-on-failure: 'true'
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --version ^0.8 --no-default-features --features postgres,rustls --locked
        working-directory: .
      - run: cargo sqlx prepare --check --workspace -- --all-targets
